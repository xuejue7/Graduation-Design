<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hadoop监控</title>
    <link href="${request.contextPath}/statics/hplus/css/bootstrap.min14ed.css?v=3.3.6" rel="stylesheet">
    <style>
        .monitor-card {
            margin: 80px auto;
            max-width: 600px;
            padding: 50px 40px;
            background: #ffffff;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
            text-align: center;
        }
        .monitor-icon {
            font-size: 70px;
            margin-bottom: 20px;
        }
        .btn-hadoop {
            background-color: #f39c12; /* Hadoop 标志性的黄色 */
            color: white;
            font-size: 18px;
            padding: 12px 35px;
            border-radius: 50px;
            font-weight: bold;
            border: none;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
            margin-top: 25px;
        }
        .btn-hadoop:hover {
            background-color: #e67e22;
            color: white;
            box-shadow: 0 6px 12px rgba(230, 126, 34, 0.3);
            text-decoration: none;
        }
    </style>
</head>
<body class="gray-bg">
<div class="monitor-card">
    <div class="monitor-icon">🐘</div>
    <h2 style="color: #333; font-weight: bold;">Hadoop 分布式存储集群</h2>
    <p style="color: #888; margin-top: 10px; font-size: 15px;">您的星云网盘底层数据节点正在运行中</p>

    <a target="_blank" href="http://127.0.0.1:9870" class="btn-hadoop">
        进入大数据控制台
    </a>
</div>
</body>
</html>
